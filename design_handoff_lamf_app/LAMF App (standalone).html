document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ontent:center;flex:none;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 18 18\"><path d=\"M3 12l4-5 3 3 5-7\" stroke=\"#0E6E62\" stroke-width=\"1.7\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan><div style=\"flex:1;\"><div style=\"font-size:14.5px;font-weight:600;color:#16243B;\">Pledge more units<\u002Fdiv><div style=\"font-size:12.5px;color:#65718A;margin-top:1px;\">Add holdings to lift drawing power<\u002Fdiv><\u002Fdiv><svg width=\"8\" height=\"14\" viewBox=\"0 0 8 14\"><path d=\"M1 1l6 6-6 6\" stroke=\"#CBD3E0\" stroke-width=\"2\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:14px;display:flex;gap:8px;align-items:flex-start;font-size:12px;color:#97A1B5;line-height:1.5;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 15 15\" style=\"margin-top:1px;flex:none;\"><circle cx=\"7.5\" cy=\"7.5\" r=\"7\" fill=\"#E7EBF1\"><\u002Fcircle><path d=\"M7.5 4v4M7.5 10.5h.01\" stroke=\"#65718A\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><span>If unresolved by the deadline, units worth the shortfall are auto-liquidated as per the pledge agreement and RBI norms. You're notified at every step via SMS, email &amp; WhatsApp.<\u002Fspan><\u002Fdiv>\n    <div style=\"height:24px;\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"padding:14px 24px 30px;background:#EDF0F4;box-shadow:0 -8px 16px rgba(237,240,244,.9);\">\n    <button onclick=\"{{ nav.dash }}\" style=\"width:100%;height:54px;border-radius:16px;border:none;background:#C2410C;color:#fff;font-family:inherit;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 6px 16px rgba(194,65,12,.26);\">Resolve now<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!--MORE-->\n<\u002Fdiv>\n<\u002Fx-import>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:402,&quot;height&quot;:874},&quot;startScreen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;welcome&quot;,&quot;options&quot;:[&quot;welcome&quot;,&quot;login&quot;,&quot;otp&quot;,&quot;verify&quot;,&quot;fetch&quot;,&quot;eligible&quot;,&quot;lenders&quot;,&quot;loan&quot;,&quot;review&quot;,&quot;success&quot;,&quot;dash&quot;,&quot;mtm&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Prototype&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen:'welcome', mobile:'9876543210', amount:600000, tenure:12, agree:false, lender:'idfc' };\n  componentDidMount(){ const ss=this.props.startScreen; if(ss && ss!==this.state.screen){ this.setState({ screen:ss }); } }\n  inr(n){ return '₹' + Math.round(n).toLocaleString('en-IN'); }\n  go(s){ this.setState({ screen:s }); try{ const el=document.querySelector('[data-scroll]'); if(el) el.scrollTop=0; }catch(e){} }\n  renderVals(){\n    const s = this.state;\n    const portfolio = 1840000;\n    const lenders = [\n      { id:'idfc',  name:'IDFC FIRST Bank', short:'IDFC',  rate:8.99,  ltv:0.60, fee:'₹0',     disbursal:'~3 min', badge:'Lowest rate' },\n      { id:'hdfc',  name:'HDFC Bank',       short:'HDFC',  rate:9.50,  ltv:0.60, fee:'₹999',   disbursal:'~5 min', badge:'' },\n      { id:'icici', name:'ICICI Bank',      short:'ICICI', rate:9.75,  ltv:0.60, fee:'₹999',   disbursal:'~5 min', badge:'' },\n      { id:'kotak', name:'Kotak Mahindra',  short:'KOTAK', rate:9.99,  ltv:0.55, fee:'₹1,499', disbursal:'~8 min', badge:'' },\n      { id:'bajaj', name:'Bajaj Finserv',   short:'BAJAJ', rate:10.50, ltv:0.60, fee:'₹1,999', disbursal:'instant', badge:'Fastest' },\n    ];\n    const sel = lenders.find(l => l.id===s.lender) || lenders[0];\n    const lowestRate = Math.min(...lenders.map(l => l.rate));\n    const rate = sel.rate;\n    const eligibleMax = Math.round(portfolio*0.60);\n    const eligible = Math.round(portfolio*sel.ltv);\n    const amount = Math.min(s.amount, eligible);\n    const dp = eligible;\n    const outstanding = amount;\n    const available = dp - outstanding;\n    const ltv = outstanding/portfolio*100;\n    const monthly = amount*(rate/100)/12;\n    const tenureLabels = { 6:'6 months', 12:'12 months', 24:'24 months', 36:'36 months' };\n    const nav = {};\n    ['welcome','login','otp','verify','fetch','eligible','lenders','loan','review','success','dash','mtm']\n      .forEach(k => nav[k] = () => this.go(k));\n    const lenderView = lenders.map(l => ({\n      id:l.id, name:l.name, short:l.short, badge:l.badge, hasBadge:!!l.badge, noBadge:!l.badge,\n      rateFmt:l.rate.toFixed(2)+'%', ltvFmt:(l.ltv*100).toFixed(0)+'%', fee:l.fee, disbursal:l.disbursal,\n      maxFmt:this.inr(Math.round(portfolio*l.ltv)),\n      selected:s.lender===l.id, unselected:s.lender!==l.id,\n      sel:()=>this.setState({ lender:l.id }),\n    }));\n    const holdings = [\n      { name:'Parag Parikh Flexi Cap', amc:'PPFAS Mutual Fund', units:'4,182.55 units', value:560000, pct:30 },\n      { name:'Axis Bluechip Fund', amc:'Axis Mutual Fund', units:'6,920.10 units', value:420000, pct:23 },\n      { name:'Mirae Asset Large Cap', amc:'Mirae Asset', units:'2,540.88 units', value:385000, pct:21 },\n      { name:'HDFC Mid-Cap Opportunities', amc:'HDFC Mutual Fund', units:'1,980.42 units', value:295000, pct:16 },\n      { name:'ICICI Pru Balanced Advantage', amc:'ICICI Prudential', units:'3,110.75 units', value:180000, pct:10 },\n    ].map(h => ({ ...h, valueFmt:this.inr(h.value), pctw:h.pct+'%' }));\n    const kycSteps = [\n      { code:'AADH', title:'Aadhaar', detail:'eKYC via UIDAI · XXXX XXXX 4471' },\n      { code:'PAN', title:'PAN', detail:'Validated via NSDL · ABCPK••••F' },\n      { code:'BANK', title:'Bank account', detail:'Penny-drop verified · HDFC ••6021' },\n      { code:'CKYC', title:'Consent & CKYC', detail:'eSign captured · 14:32 IST' },\n    ];\n    const tenureOpts = [6,12,24,36].map(m => ({\n      m, label:tenureLabels[m], active:s.tenure===m, inactive:s.tenure!==m,\n      sel:()=>this.setState({ tenure:m }),\n    }));\n    const otpDigits = ['2','4','8','1','9','6'].map(v => ({ v }));\n    const crashedPortfolio = 940000;\n    const crashedDp = Math.round(crashedPortfolio*0.6);\n    const shortfall = outstanding - crashedDp;\n    const crashedLtv = outstanding/crashedPortfolio*100;\n    return {\n      screen:s.screen, nav,\n      isWelcome:s.screen==='welcome', isLogin:s.screen==='login', isOtp:s.screen==='otp',\n      isVerify:s.screen==='verify', isFetch:s.screen==='fetch', isEligible:s.screen==='eligible',\n      isLoan:s.screen==='loan', isReview:s.screen==='review', isSuccess:s.screen==='success',\n      isDash:s.screen==='dash', isMtm:s.screen==='mtm', isLenders:s.screen==='lenders',\n      isDark: s.screen==='welcome' || s.screen==='success',\n      lenders:lenderView, lenderName:sel.name, lenderShort:sel.short, lenderCount:lenders.length,\n      lowestRateFmt:lowestRate.toFixed(2)+'%', eligibleMaxFmt:this.inr(eligibleMax), amountMax:eligible,\n      mobile:s.mobile,\n      onMobile:(e)=>this.setState({ mobile:e.target.value.replace(/[^0-9]/g,'').slice(0,10) }),\n      mobileValid:s.mobile.length===10, mobileInvalid:s.mobile.length!==10,\n      mobileMasked:(s.mobile||'').replace(/(\\d{5})(\\d{0,5})/, (m,a,b)=> a.replace(/\\d/g,'•')+' '+b ) || '••••• •••••',\n      otpDigits, holdings, kycSteps, tenureOpts,\n      portfolioFmt:this.inr(portfolio), eligibleFmt:this.inr(eligible), eligiblePct:'60%',\n      amount, amountFmt:this.inr(amount), amountMin:25000,\n      onAmount:(e)=>this.setState({ amount:+e.target.value }),\n      rate, rateFmt:rate.toFixed(2)+'% p.a.',\n      tenure:s.tenure, tenureLabel:tenureLabels[s.tenure],\n      dpFmt:this.inr(dp), outstandingFmt:this.inr(outstanding), availableFmt:this.inr(available),\n      ltvFmt:ltv.toFixed(1)+'%', monthlyFmt:this.inr(monthly),\n      utilw:(outstanding/dp*100).toFixed(0)+'%',\n      metrics:[\n        { label:'Portfolio value', value:this.inr(portfolio), sub:'NAV today', accent:false },\n        { label:'Drawing power', value:this.inr(dp), sub:'60% of holdings', accent:false },\n        { label:'Available limit', value:this.inr(available), sub:'ready to draw', accent:true },\n        { label:'Current LTV', value:ltv.toFixed(1)+'%', sub:'healthy · cap 60%', accent:false },\n        { label:'Interest rate', value:rate.toFixed(2)+'%', sub:sel.name, accent:false },\n        { label:'Next interest', value:this.inr(monthly), sub:'due 05 Jul', accent:false },\n      ],\n      agree:s.agree, agreeOn:s.agree===true, agreeOff:s.agree!==true,\n      toggleAgree:()=>this.setState({ agree:!s.agree }),\n      crashedPortfolioFmt:this.inr(crashedPortfolio), crashedDpFmt:this.inr(crashedDp),\n      shortfallFmt:this.inr(shortfall), crashedLtvFmt:crashedLtv.toFixed(1)+'%',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
